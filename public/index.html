<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="AI Development Orchestration Platform">
  <title>TangleClaw</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/logo-icon.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
</head>
<body>

  <!-- Connection toast -->
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <!-- Dashboard Bar -->
  <header class="dash-bar">
    <div class="dash-brand">
      <img class="dash-logo" src="/logo-icon.png" alt="" width="32" height="32"
           onerror="this.src='/logo.png'; this.width=32; this.height=32;">
      <img class="dash-wordmark" src="/logo-text.png" alt="TangleClaw" height="18"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'dash-title',textContent:'TANGLECLAW'}));">
      <span id="version" class="dash-version"></span>
    </div>
    <div class="dash-stats" id="dashStats">
      <span class="dash-stat"><span class="dash-stat-label">CPU</span><span class="stat-value" id="statCpu">--</span></span>
      <span class="dash-stat"><span class="dash-stat-label">MEM</span><span class="stat-value" id="statMem">--</span></span>
      <span class="dash-stat"><span class="dash-stat-label">DISK</span><span class="stat-value" id="statDisk">--</span></span>
      <span class="dash-stat"><span class="dash-stat-label">UP</span><span class="dash-stat-up" id="statUptime">--</span></span>
    </div>
    <div class="dash-actions">
      <button class="dash-action" id="portsToggle" aria-expanded="false" aria-controls="portsGrid">
        Ports <span class="dash-badge" id="portsCount">0</span>
      </button>
      <button class="dash-action" id="rulesToggle" aria-expanded="false" aria-controls="rulesPanel">
        Rules
      </button>
      <button class="dash-action dash-gear" id="gearBtn" aria-label="Settings" title="Settings">&#9881;</button>
    </div>
  </header>

  <!-- Ports Grid (expandable panel) -->
  <div id="portsGrid" class="ports-grid" aria-label="Port leases"></div>

  <!-- Global Rules Panel -->
  <div id="rulesPanel" class="rules-panel" aria-label="Global rules editor">
    <textarea class="rules-editor" id="rulesEditor" rows="10"
              placeholder="Loading global rules..." spellcheck="false"></textarea>
    <div class="rules-actions">
      <button class="btn btn-small" id="rulesResetBtn">Reset to Defaults</button>
      <button class="btn btn-small btn-primary" id="rulesSaveBtn">Save</button>
    </div>
    <div id="rulesStatus" class="rules-status hidden" role="status"></div>
  </div>

  <!-- Reset Confirmation Modal -->
  <div class="modal-backdrop" id="rulesResetModal">
    <div class="modal-content" role="dialog" aria-label="Reset global rules" aria-modal="true">
      <h3 class="modal-title">Reset Global Rules</h3>
      <p class="modal-text">This will replace your global rules with the bundled defaults. Any customizations will be lost.</p>
      <div class="modal-actions">
        <button class="btn" id="rulesResetCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="rulesResetConfirmBtn">Reset</button>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <nav class="toolbar" aria-label="Project controls">
    <div class="toolbar-left">
      <span class="session-count" id="sessionCount" aria-live="polite">0 active</span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-icon" id="filterBtn" aria-label="Toggle filter"
              aria-expanded="false" aria-controls="filterSection">
        &#128269;
      </button>
      <button class="btn btn-primary" id="newBtn" aria-label="Create new project">+ New</button>
    </div>
  </nav>

  <!-- Filter Section -->
  <section id="filterSection" class="filter-section hidden" aria-label="Project filter">
    <div class="filter-input-wrap">
      <input type="text" class="filter-input" id="filterInput"
             placeholder="Filter projects..." autocomplete="off"
             autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="filter-clear hidden" id="filterClear" aria-label="Clear filter">&times;</button>
    </div>
  </section>

  <!-- Tag Pills -->
  <div class="tag-row hidden" id="tagRow" role="toolbar" aria-label="Filter by tag"></div>

  <!-- Main Content -->
  <main id="projectsContainer" aria-label="Projects">
    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <!-- Create Project Drawer -->
  <div class="drawer-backdrop" id="createBackdrop"></div>
  <aside class="drawer" id="createDrawer" role="dialog" aria-label="Create project" aria-modal="true">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-header">
      <h2 class="drawer-title" id="createTitle">New Project</h2>
      <button class="btn btn-small btn-icon" id="createClose" aria-label="Close">&times;</button>
    </div>
    <div class="steps-row" id="createSteps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <div class="drawer-body" id="createBody"></div>
  </aside>

  <!-- Delete Confirmation Modal -->
  <div class="modal-backdrop" id="deleteModal">
    <div class="modal-content" role="dialog" aria-label="Delete or detach project" aria-modal="true">
      <h3 class="modal-title" id="deleteModalTitle" style="color:var(--danger)">Delete Project</h3>
      <p class="modal-text" id="deleteText"></p>
      <p class="modal-text" id="deleteSubtext" style="font-size:12px;color:var(--text-muted);margin-top:8px"></p>
      <div class="form-group" id="deleteConfirmGroup" style="margin-top:12px">
        <label class="form-label" for="deleteConfirmInput">Type the project name to confirm</label>
        <input type="text" class="form-input" id="deleteConfirmInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="">
      </div>
      <div class="form-group hidden" id="deletePasswordGroup">
        <label class="form-label" for="deletePassword">Password</label>
        <input type="password" class="password-input" id="deletePassword" autocomplete="off">
      </div>
      <div id="deleteError" class="form-error hidden" role="alert"></div>
      <div class="modal-actions">
        <button class="btn" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn" disabled>Delete Project</button>
      </div>
    </div>
  </div>

  <!-- Kill Session Modal -->
  <div class="modal-backdrop" id="killModal">
    <div class="modal-content" role="dialog" aria-label="Kill session" aria-modal="true">
      <h3 class="modal-title" style="color:var(--danger)">Kill Session</h3>
      <p class="modal-text" id="killText"></p>
      <div class="form-group hidden" id="killPasswordGroup">
        <label class="form-label" for="killPassword">Password</label>
        <input type="password" class="password-input" id="killPassword" autocomplete="off">
      </div>
      <div id="killError" class="form-error hidden" role="alert"></div>
      <div class="modal-actions">
        <button class="btn" id="killCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="killConfirmBtn">Kill</button>
      </div>
    </div>
  </div>

  <!-- Wrap Confirmation Modal -->
  <div class="modal-backdrop" id="wrapModal">
    <div class="modal-content" role="dialog" aria-label="Wrap session" aria-modal="true">
      <h3 class="modal-title">Wrap Session</h3>
      <p class="modal-text" id="wrapText"></p>
      <div class="form-group hidden" id="wrapPasswordGroup">
        <label class="form-label" for="wrapPassword">Password</label>
        <input type="password" class="password-input" id="wrapPassword" autocomplete="off">
      </div>
      <div id="wrapError" class="form-error hidden" role="alert"></div>
      <div class="modal-actions">
        <button class="btn" id="wrapCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="wrapConfirmBtn">Wrap</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-backdrop" id="settingsModal">
    <div class="modal-content" role="dialog" aria-label="Project settings" aria-modal="true"
         style="max-width:400px">
      <h3 class="modal-title" id="settingsTitle">Settings</h3>
      <div id="settingsBody"></div>
      <div class="modal-actions">
        <button class="btn" id="settingsCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="settingsSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Methodology Switch Confirmation Modal -->
  <div class="modal-backdrop" id="methSwitchModal">
    <div class="modal-content" role="dialog" aria-label="Switch methodology" aria-modal="true"
         style="max-width:400px">
      <h3 class="modal-title">Switch Methodology</h3>
      <div class="modal-text" id="methSwitchText"></div>
      <div class="modal-actions">
        <button class="btn" id="methSwitchCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="methSwitchConfirmBtn">Switch</button>
      </div>
    </div>
  </div>

  <!-- Global Settings Modal -->
  <div class="modal-backdrop" id="globalSettingsModal">
    <div class="modal-content" role="dialog" aria-label="Global settings" aria-modal="true"
         style="max-width:440px;max-height:85vh;overflow-y:auto">
      <h3 class="modal-title">Global Settings</h3>
      <div id="globalSettingsBody"></div>
      <div class="modal-actions">
        <button class="btn" id="globalSettingsCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="globalSettingsSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Setup Wizard Overlay -->
  <div class="setup-overlay" id="setupOverlay" role="dialog" aria-label="First-run setup wizard" aria-modal="true">
    <div class="setup-container">
      <div class="setup-header">
        <h1 class="setup-title">Setup</h1>
        <button class="btn btn-small" id="setupSkipBtn" onclick="wizardSkip()">Skip</button>
      </div>
      <div class="steps-row" id="setupSteps">
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
      <div class="setup-body" id="setupBody"></div>
    </div>
  </div>

  <script src="/landing.js"></script>
  <script src="/ui.js"></script>
  <script src="/setup.js"></script>
</body>
</html>
