# TangleClaw tmux configuration
# Optimized for remote access via ttyd on iPhone
# Canonical source — copied to ~/.tmux.conf by deploy/install.sh

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support (critical for touch interaction)
set -g mouse on

# Auto-save selection to file on mouse drag release (browser Copy button reads this)
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "cat > ~/.tangleclaw/clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "cat > ~/.tangleclaw/clipboard"

# 256 color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Disable alternate screen so xterm.js scrollback works on mobile touch
# Without this, tmux uses alt screen (zero scrollback) and touch scroll can't reach history
set -ga terminal-overrides ",xterm*:smcup@:rmcup@"

# Status bar — lime green palette (matches TangleClaw v2)
set -g status-style "bg=#1A1A1A,fg=#E8E8E8"
set -g status-left "#[fg=#8BC34A,bold] TangleClaw "
set -g status-right "#[fg=#777777] %H:%M  %Y-%m-%d "
set -g status-left-length 30
set -g status-right-length 30

# Window status
set -g window-status-format "#[fg=#777777] #I:#W "
set -g window-status-current-format "#[fg=#8BC34A,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#8BC34A"

# Don't rename windows automatically
set -g allow-rename off

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape time (faster key response)
set -sg escape-time 10

# Focus events (useful for some terminal apps)
set -g focus-events on
